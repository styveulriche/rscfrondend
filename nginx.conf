server {
    listen ${PORT};
    server_name _;

    # Taille max des uploads (images articles, partenaires, profil…)
    client_max_body_size 20M;

    # React SPA — toutes les routes renvoient index.html
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy transparent vers le backend — élimine le CORS
    location /api/ {
        proxy_pass https://rsc-production.up.railway.app/api/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host rsc-production.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Connection "";
        proxy_pass_header Authorization;
        proxy_read_timeout 120s;
        proxy_connect_timeout 15s;
        proxy_send_timeout 120s;
    }
}
