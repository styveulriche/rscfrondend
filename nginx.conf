server {
    listen ${PORT};
    server_name _;

    # Taille max des uploads (images articles, partenaires, profil…)
    client_max_body_size 20M;

    # React SPA — toutes les routes renvoient index.html
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
